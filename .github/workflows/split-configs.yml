- name: Нарезка каждого конфига на части (50, 100, 200, 300)
  run: |
    # Создаём папки
    for size in 50 100 200 300; do
      mkdir -p configs/$size
    done
    
    i=1
    for config in my-configs/*.txt; do
      if [ ! -f "$config" ]; then continue; fi
      
      name=$(basename "$config" .txt)
      echo "Режу: $name"
      
      # Извлекаем VLESS строки
      grep -E '^(vless|trojan|vmess|ss|hy2)://' "$config" > filtered.txt || true
      total=$(wc -l < filtered.txt)
      
      if [ "$total" -eq 0 ]; then
        echo "  нет конфигов, пропускаю"
        continue
      fi
      
      # Для каждого размера нарезки
      for size in 50 100 200 300; do
        part=1
        start=1
        while [ "$start" -le "$total" ]; do
          end=$((start + size - 1))
          if [ "$end" -gt "$total" ]; then end=$total; fi
          
          output="configs/${size}/${i}.${part}.txt"
          
          # Добавляем метаданные в начале файла
          {
            echo "# 🎁 improved-potatoVPN 💩"
            echo "# Интервал обновления: 1 час"
            echo "# Трафик: безлимит"
            echo "# Срок действия: бессрочно"
            echo "# Поддержка: https://t.me/freevpnconf_bot"
            echo "# Анонс / реклама: https://t.me/freevpnconf_bot"
            echo "# $name | часть $part (строки $start-$end из $total)"
            sed -n "${start},${end}p" filtered.txt
          } > "$output"
          
          part=$((part + 1))
          start=$((end + 1))
        done
        echo "  ${size}: создано $((part-1)) файлов"
      done
      
      i=$((i + 1))
    done
    
    echo "Готово! Обработано конфигов: $((i-1))"
