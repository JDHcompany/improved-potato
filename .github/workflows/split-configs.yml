name: Нарезка конфигов

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  split-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Установка утилит
        run: sudo apt-get update && sudo apt-get install -y fping parallel

      - name: Нарезка каждого конфига на части (50, 100, 200, 300) с метаданными
        run: |
          for size in 50 100 200 300; do
            mkdir -p configs/$size
          done
          
          i=1
          for config in my-configs/*.txt; do
            if [ ! -f "$config" ]; then continue; fi
            
            name=$(basename "$config" .txt)
            echo "Режу: $name"
            
            grep -E '^(vless|trojan|vmess|ss|hy2)://' "$config" > filtered.txt || true
            total=$(wc -l < filtered.txt)
            
            if [ "$total" -eq 0 ]; then
              echo "  нет конфигов, пропускаю"
              continue
            fi
            
            for size in 50 100 200 300; do
              part=1
              start=1
              while [ "$start" -le "$total" ]; do
                end=$((start + size - 1))
                if [ "$end" -gt "$total" ]; then end=$total; fi
                
                output="configs/${size}/${i}.${part}.txt"
                {
                  echo "# profile-title: 🎁improved-potatoVPN💩"
                  echo "# profile-update-interval: 1"
                  echo "# subscription-userinfo: upload=9999999999999999999; download=0; total=9999999999999999999; expire=4102444800"
                  echo "# support-url: https://t.me/freevpnconf_bot"
                  echo "# announce: Анонсы и реклама: https://t.me/freevpnconf_bot"
                  echo "# $name | часть $part (строки $start-$end из $total)"
                  sed -n "${start},${end}p" filtered.txt
                } > "$output"
                
                part=$((part + 1))
                start=$((end + 1))
              done
              echo "  ${size}: создано $((part-1)) файлов"
            done
            
            i=$((i + 1))
          done
          
          echo "Готово! Обработано конфигов: $((i-1))"

      # Новый шаг: отбор лучших 200 конфигов по пингу и нарезка по 50
      - name: Отбор лучших 200 конфигов по пингу и нарезка по 50
        run: |
          mkdir -p best/50
          
          # Собираем уникальные конфиги
          cat my-configs/*.txt 2>/dev/null | grep -E '^(vless|trojan|vmess|ss|hy2)://' | sort -u > all_unique.txt
          total_unique=$(wc -l < all_unique.txt)
          echo "Всего уникальных конфигов: $total_unique"
          
          if [ "$total_unique" -eq 0 ]; then
            echo "Нет конфигов для пингования"
            exit 0
          fi
          
          # Функция извлечения хоста
          extract_host() {
            local uri="$1"
            local without_proto=$(echo "$uri" | sed -E 's|^[a-z]+://||')
            if echo "$without_proto" | grep -q '@'; then
              without_proto=$(echo "$without_proto" | sed -E 's/.*@//')
            fi
            echo "$without_proto" | sed -E 's/^([^:/?]+).*/\1/'
          }
          
          # Сопоставление хост -> конфиг
          rm -f host_config.txt
          while IFS= read -r config; do
            host=$(extract_host "$config")
            if [ -n "$host" ]; then
              echo "$host;$config" >> host_config.txt
            fi
          done < all_unique.txt
          
          # Уникальные хосты
          cut -d';' -f1 host_config.txt | sort -u > unique_hosts.txt
          echo "Уникальных хостов для пинга: $(wc -l < unique_hosts.txt)"
          
          # Функция пинга
          ping_host() {
            local host="$1"
            local avg=$(fping -C 3 -q "$host" 2>&1 | awk -F'[:/]' '{print $2}' | awk '{sum+=$1; n++} END {if(n>0) print sum/n; else print -1}')
            if [ -z "$avg" ] || [ "$avg" = "-1" ]; then
              echo "$host 999999"
            else
              echo "$host $avg"
            fi
          }
          export -f ping_host
          
          # Параллельный пинг (50 процессов)
          cat unique_hosts.txt | parallel -j 50 ping_host {} > ping_results.txt
          
          # Массив хост -> пинг
          declare -A host_ping
          while IFS=' ' read -r host ping; do
            host_ping["$host"]="$ping"
          done < ping_results.txt
          
          # Формируем список "пинг конфиг"
          rm -f config_with_ping.txt
          while IFS=';' read -r host config; do
            ping=${host_ping["$host"]:-999999}
            echo "$ping $config" >> config_with_ping.txt
          done < host_config.txt
          
          # Сортируем по пингу и берём первые 200
          sort -n config_with_ping.txt | head -200 | cut -d' ' -f2- > best_200.txt
          best_count=$(wc -l < best_200.txt)
          echo "Отобрано лучших конфигов: $best_count"
          
          # Нарезка по 50 строк
          part=1
          start=1
          while [ "$start" -le "$best_count" ]; do
            end=$((start + 50 - 1))
            if [ "$end" -gt "$best_count" ]; then end=$best_count; fi
            
            output="best/50/best_${part}.txt"
            {
              echo "# profile-title: 🎁improved-potatoVPN💩 (лучшие по пингу)"
              echo "# profile-update-interval: 1"
              echo "# subscription-userinfo: upload=9999999999999999999; download=0; total=9999999999999999999; expire=4102444800"
              echo "# support-url: https://t.me/freevpnconf_bot"
              echo "# announce: Анонсы и реклама: https://t.me/freevpnconf_bot"
              echo "# Лучшие конфиги | часть $part (строки $start-$end из $best_count)"
              sed -n "${start},${end}p" best_200.txt
            } > "$output"
            
            part=$((part + 1))
            start=$((end + 1))
          done
          echo "Создано $((part-1)) файлов в best/50"

      - name: Создать counts.json (уникальные серверы из исходников + best)
        run: |
          echo '{' > configs/counts.json
          echo '  "updated": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",' >> configs/counts.json
          
          for size in 50 100 200 300; do
            echo "  \"$size\": {" >> configs/counts.json
            first=1
            for file in configs/$size/*.txt; do
              if [ -f "$file" ]; then
                name=$(basename "$file" .txt)
                count=$(grep -cE '^(vless|trojan|vmess|ss|hy2)://' "$file" 2>/dev/null || echo 0)
                if [ $first -eq 1 ]; then
                  first=0
                else
                  echo "," >> configs/counts.json
                fi
                echo -n "    \"$name\": $count" >> configs/counts.json
              fi
            done
            echo "" >> configs/counts.json
            echo "  }," >> configs/counts.json
          done
          
          # Добавляем статистику для лучших конфигов (размер нарезки 50)
          echo '  "best": {' >> configs/counts.json
          first=1
          for file in best/50/*.txt; do
            if [ -f "$file" ]; then
              name=$(basename "$file" .txt)
              count=$(grep -cE '^(vless|trojan|vmess|ss|hy2)://' "$file" 2>/dev/null || echo 0)
              if [ $first -eq 1 ]; then
                first=0
              else
                echo "," >> configs/counts.json
              fi
              echo -n "    \"$name\": $count" >> configs/counts.json
            fi
          done
          echo "" >> configs/counts.json
          echo "  }," >> configs/counts.json
          
          totalUnique=$(cat my-configs/*.txt 2>/dev/null | grep -E '^(vless|trojan|vmess|ss|hy2)://' | sort -u | wc -l)
          echo '  "totalUnique": '$totalUnique >> configs/counts.json
          echo '}' >> configs/counts.json
          
          echo "✅ Уникальных серверов: $totalUnique"
          echo "--- Итоговый JSON ---"
          cat configs/counts.json

      - name: Сохранить в репозиторий
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add configs/ best/
          git diff --staged --quiet || git commit -m "Нарезка конфигов и лучшие 200 по пингу (паки 50)"
          git push
