- name: Отбор лучших 200 конфигов по пингу (оптимизировано)
  run: |
    mkdir -p best/50
    
    # Собираем уникальные конфиги
    cat my-configs/*.txt 2>/dev/null | grep -E '^(vless|trojan|vmess|ss|hy2)://' | sort -u > all_unique.txt
    total_unique=$(wc -l < all_unique.txt)
    echo "Всего уникальных конфигов: $total_unique"
    
    if [ "$total_unique" -eq 0 ]; then
      echo "Нет конфигов для пингования"
      exit 0
    fi
    
    # Функция извлечения хоста (только домен/IP)
    extract_host() {
      local uri="$1"
      local without_proto=$(echo "$uri" | sed -E 's|^[a-z]+://||')
      if echo "$without_proto" | grep -q '@'; then
        without_proto=$(echo "$without_proto" | sed -E 's/.*@//')
      fi
      echo "$without_proto" | sed -E 's/^([^:/?]+).*/\1/'
    }
    
    # Сопоставление хост -> конфиг (один хост может иметь много конфигов)
    rm -f host_config.txt
    while IFS= read -r config; do
      host=$(extract_host "$config")
      if [ -n "$host" ]; then
        echo "$host;$config" >> host_config.txt
      fi
    done < all_unique.txt
    
    # Уникальные хосты
    cut -d';' -f1 host_config.txt | sort -u > unique_hosts.txt
    unique_hosts_count=$(wc -l < unique_hosts.txt)
    echo "Уникальных хостов для пинга: $unique_hosts_count"
    
    # Быстрый пинг: 1 пакет, таймаут 1 секунда, 200 параллельных процессов
    ping_host_fast() {
      local host="$1"
      # -C 1 -t 1 : 1 пакет, таймаут 1 сек
      local result=$(fping -C 1 -t 1 -q "$host" 2>&1 | awk -F'[:/]' '{print $2}')
      # result может быть "-" (нет ответа) или число
      if [[ "$result" =~ ^[0-9.]+$ ]]; then
        echo "$host $result"
      else
        echo "$host 999999"
      fi
    }
    export -f ping_host_fast
    
    start_time=$(date +%s)
    # Параллельный пинг с увеличенной параллельностью до 200
    cat unique_hosts.txt | parallel -j 200 ping_host_fast {} > ping_results.txt
    end_time=$(date +%s)
    echo "Пинг завершён за $((end_time - start_time)) секунд"
    
    # Массив хост -> пинг
    declare -A host_ping
    while IFS=' ' read -r host ping; do
      host_ping["$host"]="$ping"
    done < ping_results.txt
    
    # Формируем список "пинг конфиг"
    rm -f config_with_ping.txt
    while IFS=';' read -r host config; do
      ping=${host_ping["$host"]:-999999}
      echo "$ping $config" >> config_with_ping.txt
    done < host_config.txt
    
    # Сортируем по пингу и берём первые 200
    sort -n config_with_ping.txt | head -200 | cut -d' ' -f2- > best_200.txt
    best_count=$(wc -l < best_200.txt)
    echo "Отобрано лучших конфигов: $best_count"
    
    # Нарезка по 50
    part=1
    start=1
    while [ "$start" -le "$best_count" ]; do
      end=$((start + 50 - 1))
      if [ "$end" -gt "$best_count" ]; then end=$best_count; fi
      
      output="best/50/best_${part}.txt"
      {
        echo "# profile-title: 🎁improved-potatoVPN💩 (лучшие по пингу)"
        echo "# profile-update-interval: 1"
        echo "# subscription-userinfo: upload=9999999999999999999; download=0; total=9999999999999999999; expire=4102444800"
        echo "# support-url: https://t.me/freevpnconf_bot"
        echo "# announce: Анонсы и реклама: https://t.me/freevpnconf_bot"
        echo "# Лучшие конфиги | часть $part (строки $start-$end из $best_count)"
        sed -n "${start},${end}p" best_200.txt
      } > "$output"
      
      part=$((part + 1))
      start=$((end + 1))
    done
    echo "Создано $((part-1)) файлов в best/50"
