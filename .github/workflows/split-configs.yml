- name: Нарезка конфигов для Happ с метаданными
  run: |
    # Создаём папки
    for size in 50 100 200 300; do
      mkdir -p configs/$size
    done
    
    i=1
    for config in my-configs/*.txt; do
      if [ ! -f "$config" ]; then continue; fi
      
      name=$(basename "$config" .txt)
      echo "Режу: $name"
      
      # Извлекаем строки конфигов
      grep -E '^(vless|trojan|vmess|ss|hy2)://' "$config" > filtered.txt || true
      total=$(wc -l < filtered.txt)
      
      if [ "$total" -eq 0 ]; then
        echo "  нет конфигов, пропускаю"
        continue
      fi
      
      # Для каждого размера нарезки
      for size in 50 100 200 300; do
        part=1
        start=1
        while [ "$start" -le "$total" ]; do
          end=$((start + size - 1))
          if [ "$end" -gt "$total" ]; then end=$total; fi
          
          output="configs/${size}/${i}.${part}.txt"
          
          # Заголовок подписки в формате Happ (plain text, без base64)
          cat > "$output" << EOF
#profile-title: 🎁improved-potatoVPN💩
#profile-update-interval: 1
#subscription-userinfo: upload=0; download=0; total=0; expire=0
#support-url: https://t.me/freevpnconf_bot
#announce: Реклама моего бота: https://t.me/freevpnconf_bot

# $name | часть $part (строки $start-$end из $total)
EOF
          # Добавляем сами конфиги
          sed -n "${start},${end}p" filtered.txt >> "$output"
          
          part=$((part + 1))
          start=$((end + 1))
        done
        echo "  ${size}: создано $((part-1)) файлов"
      done
      
      i=$((i + 1))
    done
    
    echo "Готово! Обработано конфигов: $((i-1))"
