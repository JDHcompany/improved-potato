name: split

on:
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p configs/50 configs/100 configs/200 configs/300
          for config in my-configs/*.txt; do
            name=$(basename "$config" .txt)
            echo "Режу: $name"
            grep -E '^(vless|trojan|vmess|ss|hy2)://' "$config" > tmp.txt
            total=$(wc -l < tmp.txt)
            if [ "$total" -eq 0 ]; then continue; fi
            for size in 50 100 200 300; do
              part=1
              start=1
              while [ "$start" -le "$total" ]; do
                end=$((start + size - 1))
                [ "$end" -gt "$total" ] && end=$total
                out="configs/$size/${name}.${part}.txt"
                echo "🎁improved-potatoVPN💩" > "$out"
                echo "Support: https://t.me/freevpnconf_bot" » "$out"
                echo "" » "$out"
                sed -n "${start},${end}p" tmp.txt » "$out"
                part=$((part + 1))
                start=$((end + 1))
              done
            done
          done
          rm -f tmp.txt
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add configs/
          git commit -m "split configs" || echo "no changes"
          git push
