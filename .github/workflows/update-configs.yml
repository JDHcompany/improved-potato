name: Нарезка конфигов

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  split-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Нарезка каждого конфига на части
        run: |
          # Создаём папки
          for size in 50 100 200 300; do
            mkdir -p configs/$size
          done
          
          SUBSCRIPTION_TITLE="🎁improved-potatoVPN💩"
          UPDATE_INTERVAL="1"
          SUPPORT_URL="https://t.me/freevpnconf_bot"
          ANNOUNCE_URL="https://t.me/freevpnconf_bot"
          
          # Проверяем, есть ли файлы
          if [ ! -d "my-configs" ] || [ -z "$(ls my-configs/*.txt 2>/dev/null)" ]; then
            echo "❌ Нет файлов в my-configs/"
            exit 1
          fi
          
          i=1
          for config in my-configs/*.txt; do
            [ ! -f "$config" ] && continue
            
            name=$(basename "$config" .txt)
            echo "📄 Режу: $name"
            
            # Извлекаем VLESS строки
            grep -E '^(vless|trojan|vmess|ss|hy2)://' "$config" > filtered.txt || true
            total=$(wc -l < filtered.txt)
            
            if [ "$total" -eq 0 ]; then
              echo "  ⚠️ нет конфигов, пропускаю"
              continue
            fi
            
            # Для каждого размера нарезки
            for size in 50 100 200 300; do
              part=1
              start=1
              while [ "$start" -le "$total" ]; do
                end=$((start + size - 1))
                [ "$end" -gt "$total" ] && end=$total
                
                output="configs/${size}/${i}.${part}.txt"
                
                # Заголовок
                cat > "$output" « EOF
$SUBSCRIPTION_TITLE
Обновление: $UPDATE_INTERVAL
Безлимит: true
Upload: 0
Download: 0
Total: 0
Expire: 0
Support: $SUPPORT_URL
Announce: $ANNOUNCE_URL
==================================================

# $name | часть $part (строки $start-$end из $total)
EOF
                # Конфиги
                sed -n "${start},${end}p" filtered.txt » "$output"
                
                part=$((part + 1))
                start=$((end + 1))
              done
            done
            
            i=$((i + 1))
          done
          
          echo "✅ Готово! Обработано конфигов: $((i-1))"

      - name: Создать counts.json
        run: |
          cat > configs/counts.json « EOF
          {
            "updated": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "subscription": {
              "title": "🎁improved-potatoVPN💩",
              "update_interval": 1,
              "support_url": "https://t.me/freevpnconf_bot",
              "announce_url": "https://t.me/freevpnconf_bot"
            },
          EOF
          
          for size in 50 100 200 300; do
            echo "  \"$size\": {" » configs/counts.json
            for file in configs/$size/*.txt; do
              if [ -f "$file" ]; then
                name=$(basename "$file" .txt)
                count=$(grep -cE '^(vless|trojan|vmess|ss|hy2)://' "$file" 2>/dev/null || echo 0)
                echo "    \"$name\": $count," » configs/counts.json
              fi
            done
            echo "  }," » configs/counts.json
          done
          
          total=$(cat configs/*/*.txt 2>/dev/null | grep -cE '^(vless|trojan|vmess|ss|hy2)://' || echo 0)
          echo '  "totalUnique": '$total'' » configs/counts.json
          echo '}' » configs/counts.json
          
          echo "totalUnique: $total"

      - name: Сохранить в репозиторий
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add configs/
          git diff --staged --quiet || git commit -m "Нарезка конфигов $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
