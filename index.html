<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPN конфиги</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e4e4e7;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #e4e4e7, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub { color: #71717a; margin-bottom: 2rem; }
    
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .filter-btn {
      background: #1f1f2a;
      border: 1px solid #2a2a35;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      color: #a1a1aa;
      font-weight: 500;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: #06b6d4;
      color: white;
      border-color: #06b6d4;
    }
    .filter-btn:hover { background: #2a2a35; }
    
    .stats {
      background: linear-gradient(145deg, #16161b 0%, #121216 100%);
      border: 1px solid #06b6d440;
      border-radius: 1rem;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 2rem;
    }
    .stats .number { font-size: 2.5rem; font-weight: bold; color: #06b6d4; }
    
    .configs-grid {
      display: grid;
      gap: 1rem;
    }
    .card {
      background: linear-gradient(145deg, #16161b 0%, #121216 100%);
      border-radius: 1rem;
      padding: 1.2rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .card:hover { border-color: rgba(6,182,212,0.3); }
    .card-info h3 { font-size: 1rem; margin-bottom: 0.25rem; }
    .card-info .size { font-size: 0.75rem; color: #71717a; }
    .url {
      font-family: monospace;
      font-size: 0.7rem;
      background: #00000040;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      word-break: break-all;
      flex: 1;
      min-width: 200px;
    }
    button {
      background: #06b6d4;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #0891b2; transform: scale(1.02); }
    .footer { text-align: center; padding: 2rem; color: #52525b; font-size: 0.75rem; }
    .update-time { text-align: center; font-size: 0.7rem; color: #52525b; margin-top: 1rem; }
    .loading, .error { text-align: center; padding: 3rem; }
    .error { color: #f87171; background: #2a1a1a; border-radius: 1rem; }
    .debug { font-size: 0.7rem; color: #52525b; margin-top: 1rem; word-break: break-all; }
    
    @media (max-width: 700px) {
      .card { flex-direction: column; align-items: stretch; }
      .url { text-align: center; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📡 Мои VPN конфиги</h1>
  <p class="sub">Нарезка по 50 / 100 / 200 / 300 строк | Обновляется каждый час</p>

  <div class="stats">
    <div class="number" id="totalCount">—</div>
    <div>всего уникальных серверов</div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-size="50">📄 50 строк</button>
    <button class="filter-btn" data-size="100">📄 100 строк</button>
    <button class="filter-btn" data-size="200">📄 200 строк</button>
    <button class="filter-btn" data-size="300">📄 300 строк</button>
  </div>

  <div id="configsList" class="loading">Загрузка конфигов...</div>
  <div class="update-time" id="updateTime"></div>
  <div class="footer">
    🔹 Нажми на кнопку, чтобы скопировать ссылку<br>
    🔹 Каждый файл содержит до указанного количества строк
  </div>
</div>

<script>
  // Функция для определения базового пути
  function getBasePath() {
    // Если страница открыта через GitHub Pages для проекта (например, /repo-name/index.html)
    let path = window.location.pathname;
    let base = path.substring(0, path.lastIndexOf('/') + 1);
    // Если это корень (например, / или /index.html), то base будет '/'
    // Дополнительно можно проверить наличие configs/ в нескольких вариантах
    return base;
  }

  const basePath = getBasePath();
  // Пробуем относительный путь от корня сайта
  const baseUrl = window.location.origin + basePath + 'configs/';
  // Также пробуем абсолютный путь (для проектов GitHub Pages)
  const fallbackUrl = window.location.origin + '/configs/';
  
  let allData = null;
  let currentSize = '50';
  let activeUrl = baseUrl; // будет изменён после успешной загрузки

  async function loadData() {
    const container = document.getElementById('configsList');
    container.innerHTML = '<div class="loading">Загрузка конфигов...</div>';
    
    // Пробуем основной путь
    let success = false;
    for (const tryUrl of [baseUrl, fallbackUrl]) {
      try {
        const url = tryUrl + 'counts.json?t=' + Date.now();
        console.log('Пробуем загрузить:', url);
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        allData = JSON.parse(text);
        activeUrl = tryUrl;
        success = true;
        console.log('Успешно загружено с:', activeUrl);
        break;
      } catch (e) {
        console.warn('Не удалось загрузить с', tryUrl, e);
      }
    }
    
    if (!success) {
      container.innerHTML = `<div class="error">
        ❌ Не удалось загрузить configs/counts.json<br><br>
        Проверьте:<br>
        1. Запущен ли GitHub Actions (см. вкладка Actions).<br>
        2. Есть ли папка configs/ в репозитории.<br>
        3. Включён ли GitHub Pages (Settings → Pages → Branch: main).<br>
        4. Открыта ли страница через HTTPS (не file://).<br>
        <div class="debug">Пытались загрузить: ${baseUrl}counts.json и ${fallbackUrl}counts.json</div>
      </div>`;
      return;
    }
    
    // Отображаем общее количество
    document.getElementById('totalCount').innerText = allData.totalUnique || 0;
    
    if (allData.updated) {
      const date = new Date(allData.updated);
      document.getElementById('updateTime').innerHTML = '🕐 Последнее обновление: ' + date.toLocaleString('ru-RU');
    } else {
      document.getElementById('updateTime').innerHTML = '🕐 Время обновления неизвестно';
    }
    
    renderConfigs();
  }

  function renderConfigs() {
    const sizeData = allData[currentSize];
    if (!sizeData || typeof sizeData !== 'object') {
      document.getElementById('configsList').innerHTML = '<div class="card">Нет данных для этого размера</div>';
      return;
    }
    
    const files = Object.entries(sizeData);
    if (files.length === 0) {
      document.getElementById('configsList').innerHTML = '<div class="card">Нет файлов для этого размера</div>';
      return;
    }
    
    const container = document.getElementById('configsList');
    container.innerHTML = '<div class="configs-grid"></div>';
    const grid = container.querySelector('.configs-grid');
    
    files.forEach(([name, count]) => {
      const fileUrl = `${activeUrl}${currentSize}/${name}.txt`;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-info">
          <h3>📁 ${name}.txt</h3>
          <div class="size">🔹 ${Number(count).toLocaleString()} конфигов в файле</div>
        </div>
        <div class="url">${escapeHtml(fileUrl)}</div>
        <button onclick="copyUrl('${escapeHtml(fileUrl)}')">📋 Копировать</button>
      `;
      grid.appendChild(card);
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  window.copyUrl = function(url) {
    navigator.clipboard.writeText(url).then(() => {
      alert('✅ Ссылка скопирована!');
    }).catch(() => {
      alert('❌ Не удалось скопировать');
    });
  };

  // Фильтры
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSize = btn.dataset.size;
      if (allData) renderConfigs();
    });
  });

  loadData();
</script>
</body>
</html>
