<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPN конфиги</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e4e4e7;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #e4e4e7, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub { color: #71717a; margin-bottom: 2rem; }
    
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .filter-btn {
      background: #1f1f2a;
      border: 1px solid #2a2a35;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      color: #a1a1aa;
      font-weight: 500;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: #06b6d4;
      color: white;
      border-color: #06b6d4;
    }
    .filter-btn:hover { background: #2a2a35; }
    
    .stats {
      background: linear-gradient(145deg, #16161b 0%, #121216 100%);
      border: 1px solid #06b6d440;
      border-radius: 1rem;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 2rem;
    }
    .stats .number { font-size: 2.5rem; font-weight: bold; color: #06b6d4; }
    
    .configs-grid {
      display: grid;
      gap: 1rem;
    }
    .card {
      background: linear-gradient(145deg, #16161b 0%, #121216 100%);
      border-radius: 1rem;
      padding: 1.2rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .card:hover { border-color: rgba(6,182,212,0.3); }
    .card-info h3 { font-size: 1rem; margin-bottom: 0.25rem; }
    .card-info .size { font-size: 0.75rem; color: #71717a; }
    .url {
      font-family: monospace;
      font-size: 0.7rem;
      background: #00000040;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      word-break: break-all;
      flex: 1;
      min-width: 200px;
    }
    button {
      background: #06b6d4;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #0891b2; transform: scale(1.02); }
    .footer { text-align: center; padding: 2rem; color: #52525b; font-size: 0.75rem; }
    .update-time { text-align: center; font-size: 0.7rem; color: #52525b; margin-top: 1rem; }
    .loading, .error { text-align: center; padding: 3rem; }
    .error { color: #f87171; background: #2a1a1a; border-radius: 1rem; }
    .debug { font-size: 0.7rem; color: #52525b; margin-top: 1rem; word-break: break-all; }
    .retry-btn {
      background: #3f3f46;
      margin-top: 1rem;
    }
    
    @media (max-width: 700px) {
      .card { flex-direction: column; align-items: stretch; }
      .url { text-align: center; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📡 Мои VPN конфиги</h1>
  <p class="sub">Нарезка по 50 / 100 / 200 / 300 строк | Обновляется каждый час</p>

  <div class="stats">
    <div class="number" id="totalCount">—</div>
    <div>всего уникальных серверов</div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-size="50">📄 50 строк</button>
    <button class="filter-btn" data-size="100">📄 100 строк</button>
    <button class="filter-btn" data-size="200">📄 200 строк</button>
    <button class="filter-btn" data-size="300">📄 300 строк</button>
  </div>

  <div id="configsList" class="loading">Загрузка конфигов...</div>
  <div class="update-time" id="updateTime"></div>
  <div class="footer">
    🔹 Нажми на кнопку, чтобы скопировать ссылку<br>
    🔹 Каждый файл содержит до указанного количества строк
  </div>
</div>

<script>
  // Список возможных путей для поиска configs/
  // Порядок важен: сначала относительный от текущей страницы, потом корневой, потом прямой деплой
  function getPossibleBaseUrls() {
    const origin = window.location.origin;
    const path = window.location.pathname;
    // Текущий путь к директории, где лежит index.html
    let currentDir = path.substring(0, path.lastIndexOf('/') + 1);
    if (currentDir === '') currentDir = '/';
    
    const urls = [
      origin + currentDir + 'configs/',           // /repo-name/configs/ или /configs/
      origin + '/configs/',                       // /configs/ (если сайт в корне)
      origin + currentDir + 'configs/',           // дубль, но оставим
    ];
    // Убираем дубликаты
    return [...new Set(urls)];
  }

  let activeBaseUrl = null;
  let allData = null;
  let currentSize = '50';

  async function loadData() {
    const container = document.getElementById('configsList');
    const totalSpan = document.getElementById('totalCount');
    totalSpan.innerText = '—';
    container.innerHTML = '<div class="loading">🔍 Поиск configs/counts.json...</div>';
    
    const possibleUrls = getPossibleBaseUrls();
    let lastError = null;
    
    for (const base of possibleUrls) {
      try {
        const jsonUrl = base + 'counts.json?t=' + Date.now();
        console.log('Пробуем загрузить:', jsonUrl);
        const response = await fetch(jsonUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status} ${response.statusText}`);
        const text = await response.text();
        // Пробуем распарсить JSON
        let data;
        try {
          data = JSON.parse(text);
        } catch(e) {
          throw new Error('Ошибка парсинга JSON: ' + e.message + '\nПервые 200 символов: ' + text.substring(0,200));
        }
        // Успех
        activeBaseUrl = base;
        allData = data;
        console.log('Успешно загружено с:', activeBaseUrl);
        break;
      } catch (err) {
        console.warn('Не удалось загрузить с', base, err);
        lastError = err;
      }
    }
    
    if (!allData) {
      container.innerHTML = `<div class="error">
        ❌ Не удалось загрузить configs/counts.json<br><br>
        Проверьте:
        <ul style="text-align: left; display: inline-block; margin-top: 10px;">
          <li>✅ Запущен ли GitHub Actions (вкладка Actions)</li>
          <li>✅ Есть ли папка configs/ с подпапками 50/, 100/, 200/, 300/</li>
          <li>✅ Включён ли GitHub Pages (Settings → Pages → Branch: main, /root)</li>
          <li>✅ Открыта ли страница через HTTPS (не file://)</li>
        </ul>
        <div class="debug">
          Пытались загрузить:<br>
          ${possibleUrls.map(u => u + 'counts.json').join('<br>')}
          <br><br>
          Последняя ошибка: ${lastError ? lastError.message : 'неизвестно'}
        </div>
        <button class="retry-btn" onclick="location.reload()">🔄 Повторить загрузку</button>
      </div>`;
      return;
    }
    
    // Отображаем общее количество уникальных серверов
    const totalUnique = allData.totalUnique || 0;
    totalSpan.innerText = totalUnique.toLocaleString();
    
    if (allData.updated) {
      const date = new Date(allData.updated);
      document.getElementById('updateTime').innerHTML = '🕐 Обновлено: ' + date.toLocaleString('ru-RU');
    } else {
      document.getElementById('updateTime').innerHTML = '🕐 Время обновления неизвестно';
    }
    
    renderConfigs();
  }
  
  function renderConfigs() {
    const sizeData = allData[currentSize];
    if (!sizeData || typeof sizeData !== 'object') {
      document.getElementById('configsList').innerHTML = '<div class="card">Нет данных для этого размера</div>';
      return;
    }
    
    const files = Object.entries(sizeData);
    if (files.length === 0) {
      document.getElementById('configsList').innerHTML = '<div class="card">Нет файлов для этого размера</div>';
      return;
    }
    
    const container = document.getElementById('configsList');
    container.innerHTML = '<div class="configs-grid"></div>';
    const grid = container.querySelector('.configs-grid');
    
    for (const [name, count] of files) {
      const fileUrl = `${activeBaseUrl}${currentSize}/${name}.txt`;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-info">
          <h3>📁 ${escapeHtml(name)}.txt</h3>
          <div class="size">🔹 ${Number(count).toLocaleString()} конфигов в файле</div>
        </div>
        <div class="url">${escapeHtml(fileUrl)}</div>
        <button onclick="copyUrl('${escapeHtml(fileUrl)}')">📋 Копировать</button>
      `;
      grid.appendChild(card);
    }
  }
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  window.copyUrl = function(url) {
    navigator.clipboard.writeText(url).then(() => {
      alert('✅ Ссылка скопирована!');
    }).catch(() => {
      alert('❌ Не удалось скопировать');
    });
  };
  
  // Навешиваем фильтры
  function initFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSize = btn.dataset.size;
        if (allData) renderConfigs();
      });
    });
  }
  
  initFilters();
  loadData();
</script>
</body>
</html>
