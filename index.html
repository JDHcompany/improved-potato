<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍟 improved-potatoVPN</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        h1 { margin: 0 0 0.5rem 0; font-size: 2rem; }
        .badge {
            background: #334155;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--accent);
        }
        .list { display: flex; flex-direction: column; gap: 1rem; }
        .card {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }
        .info-name { font-weight: 600; margin-bottom: 0.25rem; }
        .info-url { font-size: 0.8rem; color: var(--text-muted); word-break: break-all; max-width: 70%; }
        btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        btn:hover { opacity: 0.9; }
        btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🍟 improved-potatoVPN</h1>
        <span class="badge">🍀 Безлимит без ограничений</span>
    </header>

    <div class="list" id="config-list">
        <div style="text-align: center; color: var(--text-muted);">Загрузка конфигураций...</div>
    </div>
</div>

<script>
    // Скрипт автоматически определяет адрес репозитория
    const repoUrl = window.location.href;
    
    // Генерируем список (для GitHub Pages мы можем составить структуру динамически, 
    // но так как список файлов меняется, мы запрашиваем содержимое папки через API репозитория)
    async function loadConfigs() {
        const listContainer = document.getElementById('config-list');
        try {
            // Получаем имя пользователя и репозиторий из текущего URL
            const pathParts = window.location.pathname.split('/').filter(Boolean);
            const user = window.location.hostname.split('.')[0];
            const repo = pathParts[0] || '';
            
            if (!user || !repo) {
                listContainer.innerHTML = '<div class="card">Запустите сайт через GitHub Pages</div>';
                return;
            }

            const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/configs`);
            if (!response.ok) throw new Error();
            const files = await response.json();

            listContainer.innerHTML = '';
            
            // Добавляем кнопку для Best файлов
            appendCard(listContainer, "🏆 Лучшие конфиги (Base64)", `${repoUrl}best_configs.txt`);

            files.forEach(file => {
                if (file.name.endsWith('.txt')) {
                    appendCard(listContainer, `📄 ${file.name.replace('.txt', '')}`, file.download_url);
                }
            });
        } catch (e) {
            listContainer.innerHTML = '<div class="card" style="color: #ef4444;">Ошибка загрузки списков. Проверьте, запущен ли скрипт.</div>';
        }
    }

    function appendCard(container, title, url) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div>
                <div class="info-name">${title}</div>
                <div class="info-url">${url}</div>
            </div>
            <button class="btn" onclick="copyToClipboard('${url}', this)">Копировать</button>
        `;
        container.appendChild(card);
    }

    function copyToClipboard(text, button) {
        navigator.clipboard.writeText(text).then(() => {
            const oldText = button.innerText;
            button.innerText = 'Готово! ✅';
            button.style.background = '#3b82f6';
            setTimeout(() => {
                button.innerText = oldText;
                button.style.background = '';
            }, 1500);
        });
    }

    window.onload = loadConfigs;
</script>

</body>
</html>
